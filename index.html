<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Dì Ngọc Anh ✨💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(135deg, #fff5f6 0%, #ffdde1 100%); 
            font-family: 'Quicksand', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; position: relative;
        }

        #canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

        #gift-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            background: #ffdde1; transition: 1s ease;
        }
        .gift-box {
            width: 140px; height: 140px; background: #d81b60;
            position: relative; cursor: pointer; border-radius: 15px;
            animation: bounce 1.5s infinite; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .gift-box::before { content: ''; position: absolute; width: 30px; height: 100%; background: #ffd700; left: 50%; transform: translateX(-50%); }
        .gift-box::after { content: ''; position: absolute; height: 30px; width: 100%; background: #ffd700; top: 50%; transform: translateY(-50%); }
        .lid { position: absolute; top: -8px; left: -5px; width: 150px; height: 35px; background: #ad1457; border-radius: 5px; z-index: 2; }
        @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.05); } }
        #gift-screen p { margin-top: 25px; color: #d81b60; font-size: 22px; text-align: center; font-family: 'Dancing Script', cursive; }

        #wish-screen {
            position: fixed; inset: 0; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; text-align: center; background: rgba(255,255,255,0.95);
            z-index: 90; transition: 1s;
        }
        .wish-container {
            width: 100%; max-width: 360px; padding: 30px 20px; 
            border: 2px dashed #ffb6c1; border-radius: 20px; background: white;
        }
        .wish-text { 
            font-family: 'Dancing Script', cursive; font-size: 23px; 
            line-height: 1.6; color: #ad1457; min-height: 180px; 
            text-align: center; white-space: pre-line;
        }
        .btn-open {
            margin-top: 25px; padding: 12px 35px; font-family: 'Dancing Script', cursive;
            font-size: 20px; border: none; background: #ff69b4; color: white;
            border-radius: 30px; cursor: pointer; display: none;
        }

        #photo-screen { display: none; opacity: 0; transition: 2s; text-align: center; width: 100%; z-index: 80; }
        .memory-sphere {
            position: relative; width: 320px; height: 320px;
            border-radius: 50%; overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 182, 193, 0.8);
            border: 8px solid #fff; margin: 0 auto 25px;
            animation: sphereFloat 6s infinite ease-in-out;
        }
        @keyframes sphereFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .slide-item {
            position: absolute; inset: 0; background-size: cover;
            background-position: center 20%; 
            transition: 1.5s ease-in-out; opacity: 0; transform: scale(1.2);
        }
        .slide-item.active { opacity: 1; transform: scale(1); }
        
        .button-controls { display: flex; justify-content: center; gap: 25px; margin-top: 10px; }
        .button-controls button {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            background: #ff69b4; color: #fff; font-size: 24px; cursor: pointer;
        }
        .title-final { font-family: 'Dancing Script', cursive; font-size: 30px; color: #d81b60; margin-top: 20px; }

        .heart-particle {
            position: fixed; pointer-events: none;
            animation: flyUp 3s forwards; z-index: 1000;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    
    <audio id="bgMusic" src="nh%E1%BA%A1c%20c%C6%B0%E1%BB%9Bi.mp3" loop preload="auto"></audio>

    <div id="gift-screen">
        <div class="gift-box" onclick="startEverything()">
            <div class="lid"></div>
        </div>
        <p>Gõ nhẹ vào hộp quà dì nhé! ✨🎁</p>
    </div>

    <div id="wish-screen">
        <div class="wish-container">
            <div class="wish-text" id="wishText"></div>
            <button class="btn-open" id="btnContinue" onclick="showPhotos()">Bấm để xem kỷ niệm 📸✨</button>
        </div>
    </div>

    <div id="photo-screen">
        <div class="memory-sphere" onclick="spawnHeart(event)">
            <div class="slide-item active" style="background-image: url('1.jpg');"></div>
            <div class="slide-item" style="background-image: url('2.jpg');"></div>
            <div class="slide-item" style="background-image: url('3.jpeg');"></div>
            <div class="slide-item" style="background-image: url('4.jpeg');"></div>
            <div class="slide-item" style="background-image: url('5.jpg');"></div>
            <div class="slide-item" style="background-image: url('6.jpeg');"></div>
            <div class="slide-item" style="background-image: url('7.jpeg');"></div>
            <div class="slide-item" style="background-image: url('8.jpeg');"></div>
            <div class="slide-item" style="background-image: url('9.jpeg');"></div>
            <div class="slide-item" style="background-image: url('10.jpeg');"></div>
            <div class="slide-item" style="background-image: url('11.jpeg');"></div>
        </div>
        <div class="button-controls">
            <button onclick="updateSlides('prev')">❮</button>
            <button onclick="updateSlides('next')">❯</button>
        </div>
        <div class="title-final">Mãi Hạnh Phúc Dì Nhé! ❤️</div>
    </div>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        const giftScreen = document.getElementById('gift-screen');
        const wishScreen = document.getElementById('wish-screen');
        const photoScreen = document.getElementById('photo-screen');
        const wishTextDiv = document.getElementById('wishText');
        const btnContinue = document.getElementById('btnContinue');

        const message = "Dì Ngọc Anh thương yêu! 🌸\n\nNgày hạnh phúc nhất đã đến rồi. Cháu chúc dì luôn ngập tràn tiếng cười và được chú yêu thương thật nhiều nhé! 💍✨\n\nMón quà này cháu tự tay làm, gói gọn những kỷ niệm rạng rỡ của dì...\n\nYêu dì của cháu nhiều lắm! ❤️";

        function startEverything() {
            // Ép nhạc chạy bằng tương tác người dùng
            bgMusic.play().then(() => {
                console.log("Nhạc đang phát!");
            }).catch(e => {
                // Nếu vẫn lỗi, thử lại lần nữa khi nhấn nút tiếp theo
                console.log("Chờ tương tác tiếp theo");
            });
            
            giftScreen.style.opacity = '0';
            setTimeout(() => {
                giftScreen.style.display = 'none';
                wishScreen.style.display = 'flex';
                typeWriter(message, 0);
            }, 800);
        }

        function typeWriter(text, i) {
            if (i < text.length) {
                wishTextDiv.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 50);
            } else {
                btnContinue.style.display = 'inline-block';
            }
        }

        function showPhotos() {
            // Thử phát nhạc lần nữa nếu lần đầu bị chặn
            bgMusic.play();
            wishScreen.style.opacity = '0';
            setTimeout(() => {
                wishScreen.style.display = 'none';
                photoScreen.style.display = 'block';
                setTimeout(() => photoScreen.style.opacity = '1', 100);
            }, 600);
        }

        const slides = document.querySelectorAll('.slide-item');
        let currentIndex = 0;
        function updateSlides(direction) {
            slides[currentIndex].classList.remove('active');
            if (direction === 'next') currentIndex = (currentIndex + 1) % slides.length;
            else currentIndex = (currentIndex - 1 + slides.length) % slides.length;
            slides[currentIndex].classList.add('active');
        }

        setInterval(() => { if (photoScreen.style.display === 'block') updateSlides('next'); }, 4000);

        function spawnHeart(e) {
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerHTML = '❤️';
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.fontSize = Math.random() * 20 + 20 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2500);
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.01;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 182, 193, 0.6)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (particles.length < 30) particles.push(new Particle());
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].size <= 0.2) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
